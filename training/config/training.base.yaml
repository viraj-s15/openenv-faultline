env:
  base_url: http://localhost:8000
  healthcheck_path: /state
model:
  base_model: Qwen/Qwen3-8B
  max_seq_length: 10240
  load_in_4bit: false
  lora_rank: 16
  lora_alpha: 16
  random_state: 3407
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
trainer:
  algorithm: grpo
  output_dir: training/artifacts/checkpoints
  learning_rate: 5.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_completion_length: 768
  temperature: 0.7
  beta: 0.001
  # rollout_func only fires on the vLLM path in TRL >=0.25; unsloth's
  # FastLanguageModel(fast_inference=True) provides a vLLM backend, so this
  # MUST be true for the env-grounded rollout to be exercised.
  use_vllm: true
  vllm_mode: colocate
  vllm_gpu_memory_utilization: 0.65
  vllm_max_model_length: 10240
  gradient_checkpointing: true
  max_steps: 200
  save_steps: 50
  logging_steps: 1
wandb:
  enabled: true
  project: faultline
  entity: null        # uses your default wandb entity
  run_name: null      # auto-generated if null
rollout:
  max_steps_per_episode: 4
  reward_aggregation: sum
