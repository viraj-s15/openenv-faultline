spec_version: 1
name: faultline
version: "0.1.0"
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  Faultline is an OpenEnv environment where agents interact with a live
  distributed system through bash commands.
author: Team Faultline
tags:
  - openenv
  - distributed-systems
  - cybersecurity
  - reinforcement-learning

client:
  class_name: FaultlineClient
  module: faultline_env.client

action:
  class_name: FaultlineAction
  module: faultline_env.models

observation:
  class_name: FaultlineObservation
  module: faultline_env.models

reward_range: [0.0, 1.0]

tasks:
  - name: phase-0-healthy-mesh
    description: Boot the distributed mesh and expose health and metrics for later red-team tasks.
    difficulty: easy
    max_steps: 10
  - name: phase-1-raw-bash-red
    description: Give the Red agent raw bash access to recon, attack, and stealth against the live mesh.
    difficulty: medium
    max_steps: 10
  - name: phase-2-blue-l0
    description: Train Red against a sitting-duck scripted Blue defender with no actions.
    difficulty: easy
    max_steps: 10
  - name: phase-2-blue-l1
    description: Train Red against scripted Blue service restart defense.
    difficulty: medium
    max_steps: 10
  - name: phase-2-blue-l2
    description: Train Red against scripted Blue restarts plus config watchdog restore.
    difficulty: medium
    max_steps: 10
  - name: phase-2-blue-l3
    description: Train Red against scripted Blue queue sanitizer and stale lock cleanup.
    difficulty: hard
    max_steps: 10
  - name: phase-2-blue-l4
    description: Train Red against scripted Blue metric-triggered rollback.
    difficulty: hard
    max_steps: 10
  - name: phase-2-blue-llm-showdown
    description: Evaluate Red against the single hardest prompted Blue LLM incident commander.
    difficulty: hard
    max_steps: 10
