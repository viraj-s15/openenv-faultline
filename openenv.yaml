spec_version: 1
name: wargames
version: "0.1.0"
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  WarGames is an OpenEnv environment where agents interact with a live
  distributed system through bash commands.
author: Team WarGames
tags:
  - openenv
  - distributed-systems
  - cybersecurity
  - reinforcement-learning

client:
  class_name: WarGamesClient
  module: wargames_env.client

action:
  class_name: WarGamesAction
  module: wargames_env.models

observation:
  class_name: WarGamesObservation
  module: wargames_env.models

reward_range: [0.0, 1.0]

tasks:
  - name: phase-0-healthy-mesh
    description: Boot the distributed mesh and expose health and metrics for later red-team tasks.
    difficulty: easy
    max_steps: 10
  - name: phase-1-raw-bash-red
    description: Give the Red agent raw bash access to recon, attack, and stealth against the live mesh.
    difficulty: medium
    max_steps: 10
